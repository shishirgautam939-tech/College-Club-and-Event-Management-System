databases:
  - name: ccems-db
    plan: free
    databaseName: ccems
    user: ccems

services:
  # Django REST API
  - type: web
    plan: free
    name: ccems-api
    runtime: python
    rootDir: Events-and-Clubs-Management-main/Events-and-Clubs-Management-main
    buildCommand: bash ./build.sh
    startCommand: cd backend && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ccems-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@gmail.com
      - key: DJANGO_SUPERUSER_PASSWORD
        value: admin123
      - key: DJANGO_SUPERUSER_FULL_NAME
        value: Site Admin

  # React frontend (static site)
  - type: web
    plan: free
    name: ccems-web
    runtime: static
    rootDir: Events-and-Clubs-Management-main/Events-and-Clubs-Management-main/client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ccems-api.onrender.com/api/
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
